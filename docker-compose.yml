version: '3.8'

services:
  # ============================
  # MySQL Database
  # ============================
  db:
    image: mysql:8.0
    container_name: tazur_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-tazur_cardz}
      MYSQL_USER: ${DB_USER:-tazur_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tazurpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tazur_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # ============================
  # Next.js Application
  # ============================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: tazur_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-tazur_user}
      DB_PASSWORD: ${DB_PASSWORD:-tazurpassword}
      DB_NAME: ${DB_NAME:-tazur_cardz}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      IP_HASH_SALT: ${IP_HASH_SALT}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/cards
    networks:
      - tazur_network

  # ============================
  # Nginx Reverse Proxy
  # ============================
  nginx:
    image: nginx:alpine
    container_name: tazur_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - tazur_network

# ============================
# Volumes & Networks
# ============================
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  tazur_network:
    driver: bridge
